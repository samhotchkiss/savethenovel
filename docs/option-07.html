<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Novels</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1B3A2D;
    color: #F5F0E6;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 18px;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .canopy {
    position: fixed;
    top: -60px;
    left: 0;
    right: 0;
    height: 200px;
    background: radial-gradient(ellipse at 30% 0%, #2A5E42 0%, transparent 60%),
                radial-gradient(ellipse at 75% 0%, #245640 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 120px 32px 80px;
    text-align: center;
  }
  .leaf {
    display: inline-block;
    color: #6BBD8A;
    font-size: 2rem;
    margin-bottom: 32px;
    letter-spacing: 0.5em;
    opacity: 0.7;
  }
  h1 {
    font-family: 'Merriweather', serif;
    font-weight: 900;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .tagline {
    font-family: 'Merriweather', serif;
    font-weight: 700;
    font-size: 1.2rem;
    color: #6BBD8A;
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }
  .description {
    max-width: 460px;
    margin: 0 auto 48px;
    color: rgba(245, 240, 230, 0.85);
    font-size: 1.05rem;
  }
  .manifesto {
    font-style: italic;
    color: #6BBD8A;
    font-size: 1.1rem;
    margin-bottom: 56px;
    padding: 0 20px;
  }
  .manifesto::before, .manifesto::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: #6BBD8A;
    margin: 16px auto;
    opacity: 0.5;
  }
  form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }
  input[type="email"] {
    width: 100%;
    max-width: 360px;
    padding: 14px 20px;
    border: 1px solid rgba(107, 189, 138, 0.4);
    border-radius: 6px;
    background: rgba(245, 240, 230, 0.08);
    color: #F5F0E6;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    text-align: center;
  }
  input[type="email"]::placeholder { color: rgba(245, 240, 230, 0.4); }
  input[type="email"]:focus { outline: none; border-color: #6BBD8A; background: rgba(245, 240, 230, 0.12); }
  button {
    padding: 13px 36px;
    background: #6BBD8A;
    color: #1B3A2D;
    border: none;
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #83CEAA; }
  .date {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: rgba(245, 240, 230, 0.45);
  }
  @media (max-width: 480px) {
    .container { padding: 80px 24px 60px; }
  }
</style>
</head>
<body>
<div class="canopy"></div>
<main class="container">
  <div class="leaf">&middot; &middot; &middot;</div>
  <h1>Save the Novels</h1>
  <p class="tagline">The Reader Speaks.</p>
  <p class="description">
    A site gathering personal stories about the novels that changed our lives.
    Every book left a mark — tell us about yours.
  </p>
  <blockquote class="manifesto">
    "If I'm going to fail, let me be on the side of literature."
  </blockquote>
  <form action="#">
    <input type="email" placeholder="Enter your email" required>
    <button type="submit">Join the Canopy</button>
  </form>
  <p class="date">Coming September 2026</p>
</main>
</body>
</html>
