<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Novels</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F0E6D3; color: #2C3325; font-family: 'Source Sans 3', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem; line-height: 1.7;
    }
    .plate {
      max-width: 520px; width: 100%; text-align: center;
      border: 2px solid #4A6741; padding: 3rem 2.5rem; position: relative;
    }
    .plate::before {
      content: ''; position: absolute; inset: 6px;
      border: 1px solid #4A6741; pointer-events: none;
    }
    .plate::after {
      content: ''; position: absolute; inset: 11px;
      border: 1px solid rgba(74, 103, 65, 0.3); pointer-events: none;
    }
    .latin {
      font-size: 0.7rem; font-variant: small-caps; letter-spacing: 0.25em;
      color: #4A6741; margin-bottom: 1.2rem;
    }
    .ornament {
      font-family: 'Cormorant Garamond', serif; font-size: 1.4rem;
      color: #4A6741; letter-spacing: 0.4em; margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 700;
      color: #2C3325; margin-bottom: 0.2rem; letter-spacing: 0.01em;
    }
    .tagline {
      font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
      font-style: italic; color: #4A6741; margin-bottom: 1.5rem;
    }
    .description {
      font-size: 0.95rem; color: #4D5645; font-weight: 300;
      margin: 0 auto 2rem; max-width: 380px;
    }
    .signup-form {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.75rem; margin-bottom: 2rem;
    }
    .signup-form input[type="email"] {
      width: 100%; max-width: 300px; padding: 0.7rem 1rem; border: 1px solid #A3B898;
      background: rgba(255,255,255,0.4); font-family: 'Source Sans 3', sans-serif;
      font-size: 0.9rem; color: #2C3325; text-align: center; outline: none;
      transition: border-color 0.2s;
    }
    .signup-form input::placeholder { color: #8B9680; }
    .signup-form input:focus { border-color: #4A6741; }
    .signup-form button {
      padding: 0.6rem 2rem; background: #4A6741; color: #F0E6D3; border: none;
      font-family: 'Source Sans 3', sans-serif; font-size: 0.8rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer;
      transition: background 0.2s;
    }
    .signup-form button:hover { background: #3A5432; }
    .manifesto {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 1.05rem; color: #6B7A60; margin-bottom: 1.5rem;
    }
    .coming-soon {
      font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.2em; color: #8B9680; font-weight: 600;
    }
    .end-mark {
      font-family: 'Cormorant Garamond', serif; font-size: 1rem;
      color: #4A6741; margin-top: 1rem; letter-spacing: 0.5em;
    }
    @media (max-width: 480px) {
      .plate { padding: 2rem 1.5rem; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="plate">
    <p class="latin">Ex biblioth&#x113;c&#x101; oriundus sum</p>
    <div class="ornament">&loz; &loz; &loz;</div>
    <h1>Save the Novels</h1>
    <p class="tagline">The Reader Speaks.</p>
    <p class="description">
      A gathering place for personal stories about the novels that changed our lives.
      Every reader has a book that broke them open.
    </p>
    <form class="signup-form" action="#">
      <input type="email" placeholder="your email address" required>
      <button type="submit">Be Notified</button>
    </form>
    <p class="manifesto">&ldquo;If I&rsquo;m going to fail, let me be on the side of literature.&rdquo;</p>
    <p class="coming-soon">Coming September 2026</p>
    <div class="end-mark">&mdash;</div>
  </div>
</body>
</html>
