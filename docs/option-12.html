<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Novels</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #FAFAF8;
      color: #111;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.65;
    }
    .container {
      max-width: 680px;
      width: 100%;
      text-align: center;
    }
    .meta-top {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 3rem;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
      font-size: clamp(3.2rem, 9vw, 5.5rem);
      line-height: 1.0;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 1rem;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: #111;
      margin: 2rem auto;
    }
    .divider.thin {
      width: 120px;
      background: #CCC;
    }
    .description {
      font-size: 1.1rem;
      max-width: 440px;
      margin: 0 auto 2.5rem;
      color: #333;
    }
    .form-row {
      display: flex;
      gap: 0;
      max-width: 420px;
      margin: 0 auto 2.5rem;
      border: 1px solid #111;
    }
    .form-row input[type="email"] {
      flex: 1;
      padding: 0.85rem 1rem;
      border: none;
      background: transparent;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      color: #111;
      outline: none;
    }
    .form-row input[type="email"]::placeholder { color: #999; }
    .form-row button {
      padding: 0.85rem 1.5rem;
      background: #111;
      color: #FAFAF8;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .form-row button:hover { background: #333; }
    .manifesto {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: #555;
      margin-bottom: 2.5rem;
    }
    .date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #999;
    }
    @media (max-width: 500px) {
      .form-row { flex-direction: column; border: none; }
      .form-row input[type="email"] { border: 1px solid #111; margin-bottom: 0.5rem; }
      .form-row button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <p class="meta-top">Est. 2026 &mdash; A Literary Project</p>
    <h1>Save the Novels</h1>
    <p class="tagline">The Reader Speaks.</p>
    <div class="divider"></div>
    <p class="description">A site gathering personal stories about the novels that changed our lives. Every reading life holds a story worth telling.</p>
    <form action="#" class="form-row">
      <input type="email" placeholder="you@email.com" required>
      <button type="submit">Subscribe</button>
    </form>
    <div class="divider thin"></div>
    <p class="manifesto">&ldquo;If I&rsquo;m going to fail, let me be on the side of literature.&rdquo;</p>
    <p class="date">Coming September 2026</p>
  </main>
</body>
</html>
