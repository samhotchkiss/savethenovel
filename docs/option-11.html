<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Novels</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #E8E6E3;
      color: #2D2D2D;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
    }
    .container {
      max-width: 620px;
      width: 100%;
    }
    .rule {
      width: 60px;
      height: 3px;
      background: #B87333;
      margin-bottom: 2rem;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: clamp(2.8rem, 7vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .tagline {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 1.25rem;
      color: #B87333;
      margin-bottom: 2rem;
    }
    .description {
      font-size: 1.05rem;
      max-width: 480px;
      margin-bottom: 2.5rem;
      color: #4A4A4A;
    }
    .form-group {
      display: flex;
      gap: 0;
      margin-bottom: 2.5rem;
      max-width: 440px;
    }
    .form-group input[type="email"] {
      flex: 1;
      padding: 0.8rem 1rem;
      border: 2px solid #C8C4BF;
      border-right: none;
      background: rgba(255,255,255,0.5);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.95rem;
      color: #2D2D2D;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input[type="email"]:focus {
      border-color: #B87333;
    }
    .form-group button {
      padding: 0.8rem 1.6rem;
      background: #B87333;
      color: #FAFAF8;
      border: 2px solid #B87333;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
    }
    .form-group button:hover {
      background: #9A5F28;
      border-color: #9A5F28;
    }
    .manifesto {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 1rem;
      color: #6B6560;
      border-left: 3px solid #B87333;
      padding-left: 1.2rem;
      margin-bottom: 2.5rem;
      max-width: 420px;
    }
    .date {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8A8580;
    }
    @media (max-width: 500px) {
      .form-group { flex-direction: column; }
      .form-group input[type="email"] { border-right: 2px solid #C8C4BF; border-bottom: none; }
      .form-group input[type="email"]:focus { border-color: #B87333; }
      .form-group button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="rule"></div>
    <h1>Save the Novels</h1>
    <p class="tagline">The Reader Speaks.</p>
    <p class="description">A site gathering personal stories about the novels that changed our lives. Your reading life matters&mdash;and we want to hear it.</p>
    <form action="#" class="form-group">
      <input type="email" placeholder="Your email address" required>
      <button type="submit">Notify Me</button>
    </form>
    <blockquote class="manifesto">&ldquo;If I&rsquo;m going to fail, let me be on the side of literature.&rdquo;</blockquote>
    <p class="date">Coming September 2026</p>
  </main>
</body>
</html>
