<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Novels</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F5F3F0;
    color: #1A1A1A;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 18px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
  }
  .page {
    width: 100%;
    max-width: 900px;
    padding: 80px 40px;
    margin-left: max(40px, 12vw);
  }
  .rule {
    width: 60px;
    height: 3px;
    background: #1A1A1A;
    margin-bottom: 40px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(3rem, 7vw, 5.5rem);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .tagline {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.2rem, 2.5vw, 1.6rem);
    font-style: italic;
    color: #555;
    margin-bottom: 48px;
  }
  .description {
    max-width: 520px;
    font-size: 1.1rem;
    color: #333;
    margin-bottom: 40px;
  }
  .manifesto {
    border-left: 3px solid #1A1A1A;
    padding-left: 20px;
    font-style: italic;
    color: #555;
    max-width: 480px;
    margin-bottom: 56px;
    font-size: 1.05rem;
  }
  .form-group {
    display: flex;
    gap: 12px;
    max-width: 460px;
    margin-bottom: 20px;
  }
  .form-group input[type="email"] {
    flex: 1;
    padding: 14px 18px;
    border: 2px solid #1A1A1A;
    background: transparent;
    font-family: 'Source Serif 4', serif;
    font-size: 1rem;
    color: #1A1A1A;
  }
  .form-group input[type="email"]::placeholder { color: #999; }
  .form-group button {
    padding: 14px 28px;
    background: #1A1A1A;
    color: #F5F3F0;
    border: none;
    font-family: 'Source Serif 4', serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .form-group button:hover { background: #333; }
  .date {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #888;
  }
  @media (max-width: 640px) {
    .page { margin-left: 24px; padding: 60px 24px; }
    .form-group { flex-direction: column; }
    .form-group button { padding: 14px; }
  }
</style>
</head>
<body>
<main class="page">
  <div class="rule"></div>
  <h1>Save the<br>Novels</h1>
  <p class="tagline">The Reader Speaks.</p>
  <p class="description">
    A site gathering personal stories about the novels that changed our lives.
    Your reading history matters — we want to hear it.
  </p>
  <blockquote class="manifesto">
    "If I'm going to fail, let me be on the side of literature."
  </blockquote>
  <form action="#" class="form-group">
    <input type="email" placeholder="Your email address" required>
    <button type="submit">Notify Me</button>
  </form>
  <p class="date">Coming September 2026</p>
</main>
</body>
</html>
